version: '3.8'

services:
  backend:
    build: ./backend
    container_name: arc-migrator-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/arc_migrator.db
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: arc-migrator-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
